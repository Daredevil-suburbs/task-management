# ===========================
# Application Config
# ===========================
spring.application.name=task-management

# ===========================
# MySQL Database Config
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/taskdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate Config
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# Server Config
# ===========================
server.port=3306

# ===========================
# JWT Config
# ===========================
app.jwt.secret=mySecretKey123456789012345678901234567890123456789012345678901234
app.jwt.expiration=86400000
